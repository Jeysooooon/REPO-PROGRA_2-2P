<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-danger">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0">Confirmar Eliminación</h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-warning" role="alert">
                            <strong>¡Atención!</strong> Está a punto de eliminar este producto de forma permanente.
                        </div>

                        <form action="" method="POST" id="formEliminar">
                            <div class="mb-3">
                                <label for="ProNombre" class="form-label">Nombre del Producto</label>
                                <input type="text" class="form-control" id="ProNombre" name="ProNombre" value="{{ producto.1 }}" disabled>
                            </div>

                            <div class="mb-3">
                                <label for="ProDescripcion" class="form-label">Descripción</label>
                                <textarea class="form-control" id="ProDescripcion" name="ProDescripcion" rows="2" disabled>{{ producto.2 }}</textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="ProPrecio" class="form-label">Precio</label>
                                    <input type="number" class="form-control" id="ProPrecio" name="ProPrecio" value="{{ producto.3 }}" disabled>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="ProCosto" class="form-label">Costo</label>
                                    <input type="number" class="form-control" id="ProCosto" name="ProCosto" value="{{ producto.4 }}" disabled>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="ProStock" class="form-label">Stock</label>
                                    <input type="number" class="form-control" id="ProStock" name="ProStock" value="{{ producto.5 }}" disabled>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <a href="/productos/" class="btn btn-secondary">Cancelar y Volver</a>
                                <button type="submit" class="btn btn-danger" onclick="return confirmarEliminacion()">Eliminar Producto</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function confirmarEliminacion() {
            // Intercepta el envío del formulario para una confirmación final
            return confirm("¿Está completamente seguro de que desea eliminar '{{ producto.1 }}'? Esta acción no se puede deshacer.");
        }
    </script>
</body>
</html>
